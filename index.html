<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MFD Memory Module</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Roboto+Mono:wght=400;700&display=swap');

:root {
    /* Aviation Display Color Palette */
    --bg-cockpit: #0a1118;
    --panel-border: #34495e;
    --text-active: #00ffff;
    --text-data: #ffffff;
    --text-standby: #95a5a6;
    --warning-amber: #f1c40f;
    --error-red: #e74c3c;
    --success-green: #2ecc71;
    --screen-glow: rgba(0, 255, 255, 0.1);
}

* {
    box-sizing: border-box;
}

body {
    background-color: var(--bg-cockpit);
    color: var(--text-data);
    font-family: 'Roboto Mono', monospace;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
    overflow: hidden;
}

#efb-container {
    background-color: #1c2e3e;
    border: 10px solid var(--panel-border);
    border-radius: 12px;
    width: 850px;
    height: 580px;
    box-shadow: 0 0 30px rgba(0,0,0,0.8), inset 0 0 15px rgba(255,255,255,0.1);
    position: relative;
    display: flex;
    flex-direction: column;
    padding: 5px;
}

.bezel-button {
    position: absolute;
    background: #2c3e50;
    border: 1px solid #1a252f;
    color: #7f8c8d;
    font-size: 10px;
    padding: 5px;
    border-radius: 4px;
    text-align: center;
    cursor: not-allowed;
}
.b-top { top: -35px; width: 60px; left: 50%; transform: translateX(-50%); }
.b-left { left: -35px; top: 50%; transform: translateY(-50%) rotate(-90deg); width: 80px;}

#screen {
    background: black;
    flex-grow: 1;
    border: 2px solid #000;
    border-radius: 4px;
    position: relative;
    box-shadow: inset 0 0 50px var(--screen-glow);
    display: flex;
    flex-direction: column;
    padding: 20px;
    overflow: hidden;
}

#status-bar {
    border-bottom: 2px solid var(--panel-border);
    padding-bottom: 10px;
    margin-bottom: 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 13px;
    color: var(--text-standby);
}

/* New layout containers for tighter control alignment */
.status-left-cluster {
    display: flex;
    align-items: center;
    gap: 20px; /* Controls exact spacing between the items on the left */
}

.status-right-cluster {
    display: flex;
    align-items: center;
    gap: 20px; /* Controls exact spacing between telemetry items on the right */
}

.status-item {
    display: flex;
    align-items: center;
    gap: 8px;
    white-space: nowrap;
}

.status-item span {
    color: var(--warning-amber);
}

.status-item span.cyan-text {
    color: var(--text-active);
    font-weight: bold;
}

/* Dropdown Array Matrix Style */
.matrix-select {
    background: #1c2e3e;
    border: 1px solid var(--panel-border);
    color: var(--text-active);
    font-family: 'Roboto Mono', monospace;
    font-size: 11px;
    font-weight: bold;
    padding: 2px 4px;
    outline: none;
    cursor: pointer;
    border-radius: 3px;
}

.matrix-select option {
    background: #0a1118;
    color: var(--text-data);
}

/* Flight Manual Link & Audio Toggle Style */
.manual-link, .audio-toggle-btn {
    color: #000;
    background-color: var(--warning-amber);
    text-decoration: none;
    font-weight: bold;
    font-size: 12px;
    padding: 2px 8px;
    border-radius: 3px;
    text-transform: uppercase;
    transition: all 0.2s;
    border: none;
    font-family: 'Roboto Mono', monospace;
    cursor: pointer;
}

.manual-link:hover, .audio-toggle-btn:hover {
    background-color: #f39c12;
}

.audio-toggle-btn.muted-state {
    background-color: #7f8c8d;
    color: #fff;
}

#main-display {
    flex-grow: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    position: relative;
}

#memorize-prompt {
    color: var(--text-standby);
    font-size: 18px;
    margin-bottom: 10px;
}

#word-readout {
    font-size: 64px;
    letter-spacing: 15px;
    color: var(--text-active);
    text-shadow: 0 0 10px var(--text-active);
    min-height: 80px;
    text-align: center;
    transition: opacity 0.2s ease;
}

#timer-zone {
    position: relative;
    width: 450px;
    height: 14px;
    border: 2px solid var(--panel-border);
    background: rgba(0, 0, 0, 0.6);
    margin-top: 25px;
    padding: 2px;
}

#timer-bar-fill {
    background-color: var(--text-active);
    height: 100%;
    width: 100%;
    transition: width 0.1s linear;
}

#timer-digital {
    position: absolute;
    bottom: -25px;
    left: 50%;
    transform: translateX(-50%);
    color: var(--warning-amber);
    font-weight: bold;
    font-size: 14px;
    letter-spacing: 1px;
}

#control-sector {
    border-top: 1px solid var(--panel-border);
    padding-top: 15px;
    margin-top: auto;
    text-align: center;
    min-height: 150px;
}

input[type="text"] {
    background-color: transparent;
    border: 2px solid var(--panel-border);
    color: var(--text-active);
    font-family: 'Roboto Mono', monospace;
    font-size: 24px;
    padding: 10px;
    width: 300px;
    text-align: center;
    text-transform: uppercase;
    outline: none;
    margin-bottom: 10px;
    transition: border-color 0.3s;
}

input[type="text"]:focus {
    border-color: var(--text-active);
}

.aviator-btn {
    background: #2c3e50;
    border: 1px solid var(--panel-border);
    color: var(--text-data);
    font-family: 'Roboto Mono', monospace;
    text-transform: uppercase;
    font-weight: bold;
    font-size: 16px;
    padding: 12px 24px;
    cursor: pointer;
    box-shadow: 0 4px #1a252f;
    transition: all 0.1s ease;
}

.aviator-btn:hover {
    background: #3e5871;
}

.aviator-btn:active {
    box-shadow: 0 0 #1a252f;
    transform: translateY(4px);
}

/* Style panel for Tactical Tips */
#debrief-panel {
    background: rgba(231, 76, 60, 0.08);
    border: 1px dashed var(--error-red);
    padding: 10px;
    margin: 10px auto 15px auto;
    width: 90%;
    border-radius: 4px;
    font-size: 13px;
    line-height: 1.4;
    text-align: left;
}

.hidden { display: none !important; }
.correct { color: var(--success-green) !important; }
.incorrect { color: var(--error-red) !important; }
.prompt-amber { color: var(--warning-amber) !important; }

</style>
</head>
<body>

<div id="efb-container">
<div class="bezel-button b-top">POWER</div>
<div class="bezel-button b-left">BRT ADJ</div>

<div id="screen">
<div id="status-bar">
    <div class="status-left-cluster">
        <div class="status-item">DATA MODE: 
            <select id="data-mode-select" class="matrix-select">
                <option value="alpha">LETTERS ONLY</option>
                <option value="numeric">NUMBERS ONLY</option>
                <option value="mixed">MIXED DATA</option>
            </select>
        </div>
        <div class="status-item">AUDIO: <button id="audio-toggle" class="audio-toggle-btn">ON</button></div>
    </div>
    
    <div class="status-right-cluster">
        <div class="status-item"> MEMORY: <span>[LEVEL <span id="level-count">01</span>]</span></div>
        <div class="status-item">
            <a href="strategies.html" target="_blank" class="manual-link">Strategies</a>
        </div>
        <div class="status-item">CORR: <span id="correct-count">00</span> INCORR: <span id="incorrect-count">00</span></div>
    </div>
</div>

<div id="main-display">
    <div id="memorize-prompt" class="hidden">MEMORIZE DATA STRING:</div>
    <div id="word-readout">SYSTEM READY</div>

    <div id="timer-zone" class="hidden">
        <div id="timer-bar-fill"></div>
        <div id="timer-digital">5S</div>
    </div>
</div>

<div id="control-sector">

    <div id="input-group" class="hidden">
        <div class="prompt-amber" style="margin-bottom: 10px;">PILOT INPUT: [RECALL MODE]</div>
        <input type="text" id="guess-input" autocomplete="off" maxlength="15">
        <br>
        <button id="submit-btn" class="aviator-btn">Enter</button>
    </div>

    <div id="replay-group" class="hidden">
        <div id="feedback-text"></div>

        <div id="debrief-panel" class="hidden">
            <span class="prompt-amber" style="font-weight: bold;">TACTICAL DEBRIEF:</span> 
            <span id="tip-text"></span>
        </div>

        <button id="action-btn" class="aviator-btn">Initialize New Module</button>
    </div>

    <div id="start-group">
        <button id="start-btn" class="aviator-btn">Initialize System</button>
    </div>

</div>

</div>
</div>

<script>
let levelCount = 1;
let correct = 0;
let incorrect = 0;
let currentWordString = "";
let isCountingDown = false;
let isAudioMuted = false;

// DOM Element References
const levelDisplay = document.getElementById('level-count');
const correctDisplay = document.getElementById('correct-count');
const incorrectDisplay = document.getElementById('incorrect-count');
const wordReadout = document.getElementById('word-readout');
const memorizePrompt = document.getElementById('memorize-prompt');
const guessInput = document.getElementById('guess-input');

// Zones/Groups
const timerZone = document.getElementById('timer-zone');
const timerBar = document.getElementById('timer-bar-fill');
const timerDigital = document.getElementById('timer-digital');
const startGroup = document.getElementById('start-group');
const inputGroup = document.getElementById('input-group');
const replayGroup = document.getElementById('replay-group');
const feedbackText = document.getElementById('feedback-text');
const debriefPanel = document.getElementById('debrief-panel');
const tipText = document.getElementById('tip-text');

// Controls & Selectors
const startBtn = document.getElementById('start-btn');
const submitBtn = document.getElementById('submit-btn');
const actionBtn = document.getElementById('action-btn');
const audioToggleBtn = document.getElementById('audio-toggle');
const dataModeSelect = document.getElementById('data-mode-select');

/* Aviation/Technical Memory Tips Data Array */
const memoryTips = {
    lengthShort: "DATA TRUNCATION error. You submitted fewer characters than required. Try 'Chunking': Break the characters into pairs of two (e.g., 'XF KM') to reduce working memory load.",
    lengthLong: "OVER-BUFFER error. Input length exceeds target string. Focus strictly on the data stream as it reads from left-to-right.",
    transposition: "SEQUENCE TRANSPOSITION error. You had the right letters/digits, but out of sequence. Tip: Use 'Subvocalization'. Quietly pronounce the chunk matrix as a single rhythmic pattern.",
    completeMismatch: "SIGNAL LOSS error. The input deviated heavily. Tip: Assign structural associations or try to build temporary connections via 'Pseudoword Synthesis'."
};

// --- AERONAUTIC SYNTHESIZED SOUND SYSTEM ---
let audioCtx = null;

function initAudio() {
    if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
}

function playClickSound() {
    if (isAudioMuted) return;
    initAudio();
    let osc = audioCtx.createOscillator();
    let gain = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(1200, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(300, audioCtx.currentTime + 0.04);
    gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.04);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + 0.04);
}

function playSuccessChime() {
    if (isAudioMuted) return;
    initAudio();
    let t = audioCtx.currentTime;
    [587.33, 880].forEach((freq, idx) => {
        let osc = audioCtx.createOscillator();
        let gain = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(freq, t + (idx * 0.08));
        gain.gain.setValueAtTime(0.12, t + (idx * 0.08));
        gain.gain.exponentialRampToValueAtTime(0.001, t + (idx * 0.08) + 0.3);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start(t + (idx * 0.08));
        osc.stop(t + (idx * 0.08) + 0.3);
    });
}

function playErrorHorn() {
    if (isAudioMuted) return;
    initAudio();
    let t = audioCtx.currentTime;
    let osc1 = audioCtx.createOscillator();
    let osc2 = audioCtx.createOscillator();
    let gain = audioCtx.createGain();
    osc1.type = 'sawtooth';
    osc1.frequency.setValueAtTime(180, t);
    osc2.type = 'sine';
    osc2.frequency.setValueAtTime(185, t); 
    gain.gain.setValueAtTime(0.15, t);
    gain.gain.linearRampToValueAtTime(0.15, t + 0.15);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.35);
    osc1.connect(gain);
    osc2.connect(gain);
    gain.connect(audioCtx.destination);
    osc1.start(t);
    osc2.start(t);
    osc1.stop(t + 0.35);
    osc2.stop(t + 0.35);
}

function playTimerEndSound() {
    if (isAudioMuted) return;
    initAudio();
    let osc = audioCtx.createOscillator();
    let gain = audioCtx.createGain();
    osc.type = 'triangle';
    osc.frequency.setValueAtTime(400, audioCtx.currentTime);
    gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.15);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + 0.15);
}

function toggleAudioProfile() {
    isAudioMuted = !isAudioMuted;
    if (isAudioMuted) {
        audioToggleBtn.innerText = "MUTED";
        audioToggleBtn.classList.add('muted-state');
    } else {
        audioToggleBtn.innerText = "ON";
        audioToggleBtn.classList.remove('muted-state');
        playClickSound();
    }
}

// --- DYNAMIC DATA GENERATOR FUNCTIONS ---
function generateRandomCharacter(mode) {
    const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
    const numbers = "0123456789";
    
    if (mode === "numeric") {
        return numbers.charAt(Math.floor(Math.random() * numbers.length));
    } else if (mode === "mixed") {
        const combined = letters + numbers;
        return combined.charAt(Math.floor(Math.random() * combined.length));
    } else {
        return letters.charAt(Math.floor(Math.random() * letters.length));
    }
}

function generateMemoryString(length, mode) {
    let tempWordArray = [];
    for (let i = 0; i < length; i++) {
        tempWordArray.push(generateRandomCharacter(mode));
    }
    return tempWordArray.join(" "); 
}

function pad(num) {
    return num.toString().padStart(2, '0');
}

function updateStatusBar() {
    levelDisplay.innerText = pad(levelCount);
    correctDisplay.innerText = pad(correct);
    incorrectDisplay.innerText = pad(incorrect);
}

const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));

async function runMemorizationTimer(seconds) {
    isCountingDown = true;
    timerZone.classList.remove('hidden');

    const baseInterval_ms = (3 / levelCount) * 1000;

    for (let i = seconds; i > 0; i--) {
        if (!isCountingDown) break; 

        timerDigital.innerText = i + "S";
        const fillPercentage = (i / seconds) * 100;
        timerBar.style.width = fillPercentage + "%";

        if(i > 1) { setTimeout(playClickSound, baseInterval_ms / 2); }

        await sleep(baseInterval_ms);
    }

    if (isCountingDown) { playTimerEndSound(); }
    isCountingDown = false;
    completeMemorizationPhase();
}

function completeMemorizationPhase() {
    wordReadout.innerText = "";
    wordReadout.style.opacity = 0;
    memorizePrompt.classList.add('hidden');
    timerZone.classList.add('hidden');

    inputGroup.classList.remove('hidden');
    guessInput.value = "";
    guessInput.focus();
}

function startRound() {
    playClickSound();
    updateStatusBar();
    startGroup.classList.add('hidden');
    inputGroup.classList.add('hidden');
    replayGroup.classList.add('hidden');
    debriefPanel.classList.add('hidden'); 
    wordReadout.style.opacity = 1;
    wordReadout.classList.remove('correct', 'incorrect');
    
    dataModeSelect.disabled = true;
    guessInput.blur();

    timerBar.style.width = "100%";

    const wordLength = Math.floor(Math.random() * ((5 + levelCount) - 4)) + 4;
    const activeMode = dataModeSelect.value;

    currentWordString = generateMemoryString(wordLength, activeMode);
    wordReadout.innerText = currentWordString;
    memorizePrompt.classList.remove('hidden');

    runMemorizationTimer(wordLength);
}

function analyzeErrorType(guess, actual) {
    if (guess.length < actual.length) return memoryTips.lengthShort;
    if (guess.length > actual.length) return memoryTips.lengthLong;

    let sortedGuess = guess.split('').sort().join('');
    let sortedActual = actual.split('').sort().join('');
    if (sortedGuess === sortedActual) return memoryTips.transposition;

    return memoryTips.completeMismatch;
}

function finalizeGuess() {
    if (isCountingDown) return; 

    const rawGuess = guessInput.value.toUpperCase();
    const formattedGuess = rawGuess.split('').join(' ');

    const pilotGuess = rawGuess.replace(/\s/g, "");
    const actualString = currentWordString.replace(/\s/g, "");

    inputGroup.classList.add('hidden');
    wordReadout.style.opacity = 1;
    
    dataModeSelect.disabled = false;

    let feedbackHTML = "";

    if (pilotGuess === actualString) {
        playSuccessChime(); 
        wordReadout.innerText = "VALIDATED";
        wordReadout.classList.add('correct');
        feedbackHTML = `<span class="correct">DATA MATCH CONFIRMED.</span>`;
        correct++;

        if (correct % 3 === 0) {
            levelCount++;
        }
    } else {
        playErrorHorn(); 
        wordReadout.innerText = "ERROR";
        wordReadout.classList.add('incorrect');
        
        feedbackHTML = `<span class="incorrect">DATA MISMATCH DETECTED.</span><br><br>
                        __PILOT INPUT: <span class="incorrect">${formattedGuess || "[EMPTY]"}</span><br>
                        EXPECTED DATA: <span class="correct">${currentWordString}</span>`;
        incorrect++;

        const diagnosticTip = analyzeErrorType(pilotGuess, actualString);
        tipText.innerText = diagnosticTip;
        debriefPanel.classList.remove('hidden');
    }

    if (levelCount >= 10) {
        levelCount = 10;
    }

    updateStatusBar();
    const totalRounds = correct + incorrect;
    feedbackText.innerHTML = `${feedbackHTML}<br><br>Current Session Score: ${correct}/${totalRounds}`;
    replayGroup.classList.remove('hidden');
}

// Click Event Listeners
startBtn.addEventListener('click', startRound);
actionBtn.addEventListener('click', startRound);
submitBtn.addEventListener('click', finalizeGuess);
audioToggleBtn.addEventListener('click', toggleAudioProfile);
dataModeSelect.addEventListener('change', playClickSound);

// Dynamic Typing Sounds
guessInput.addEventListener('input', playClickSound);

// Global Keyboard State Handler
window.addEventListener('keydown', function (e) {
    if (e.key === 'Enter') {
        if (!startGroup.classList.contains('hidden')) {
            startRound();
        } 
        else if (!inputGroup.classList.contains('hidden')) {
            finalizeGuess();
        } 
        else if (!replayGroup.classList.contains('hidden')) {
            startRound();
        }
    }
});
</script>

</body>
</html>
